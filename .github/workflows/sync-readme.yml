name: Sync Profile README

on:
  push:
    paths:
      - "content/en/about/getting-started.md"
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v4

      - name: Process README
        run: |
          # --- Calculate experience years dynamically ---
          CURRENT_YEAR=$(date +%Y)
          CURRENT_MONTH=$(date +%-m)
          CURRENT_MONTHS=$((CURRENT_YEAR * 12 + CURRENT_MONTH))

          # Frontend: May 2021, step = 1 year (12 months), ceil up
          FE_START=$((2021 * 12 + 5))
          FE_DIFF=$((CURRENT_MONTHS - FE_START))
          FE_YEARS=$(( (FE_DIFF + 11) / 12 ))

          # Backend: January 2025, step = 0.5 year (6 months), ceil up
          BE_START=$((2025 * 12 + 1))
          BE_DIFF=$((CURRENT_MONTHS - BE_START))
          BE_HALF_YEARS=$(( (BE_DIFF + 5) / 6 ))
          if [ $((BE_HALF_YEARS % 2)) -eq 0 ]; then
            BE_YEARS="$((BE_HALF_YEARS / 2))"
          else
            BE_YEARS="$((BE_HALF_YEARS / 2)).5"
          fi

          echo "Frontend: ${FE_YEARS} years, Backend: ${BE_YEARS} years"

          # --- Strip YAML frontmatter, substitute MDC components, fix links ---
          awk 'BEGIN {found=0} /^---$/ && found < 2 {found++; next} found >= 2 || found == 0 {print}' content/en/about/getting-started.md | \
          sed "s|:ExperienceText{type=\"frontend\"}|${FE_YEARS}|g" | \
          sed "s|:ExperienceText{type=\"backend\"}|${BE_YEARS}|g" | \
          sed 's|(/docs/|(https://aganov.dev/docs/|g' | \
          awk 'BEGIN{h1=0} h1==0 && /^# [^#]/{h1=1; next} {print}' > /tmp/README.md

          echo "--- Generated README.md ---"
          cat /tmp/README.md

      - name: Push README to Profile Repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/davidaganov/davidaganov.git /tmp/profile-repo
          cp /tmp/README.md /tmp/profile-repo/README.md
          cd /tmp/profile-repo
          git config user.email "davidaganov21@gmail.com"
          git config user.name "David Aganov"
          git add README.md
          git diff --cached --quiet && echo "No changes, skipping push." || git commit -m "chore: sync README from portfolio"
          git diff HEAD~1..HEAD --stat 2>/dev/null || true
          git push
