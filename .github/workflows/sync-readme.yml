name: Sync Profile README

on:
  push:
    paths:
      - "content/ru/about/getting-started.md"
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v4

      - name: Process README
        run: |
          # Robustly remove only the FIRST YAML frontmatter block
          # and transform relative links to absolute ones
          awk 'BEGIN {found=0} /^---$/ && found < 2 {found++; next} found >= 2 || found == 0 {print}' content/ru/about/getting-started.md | \
          sed 's|(/docs/|https://aganov.dev/docs/|g' > README.md

      - name: Pushes to Profile Repo
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.GH_PAT }}
        with:
          source-directory: "."
          destination-github-username: "davidaganov"
          destination-repository-name: "davidaganov"
          user-email: davidaganov21@gmail.com
          target-branch: main
          target-directory: ""
          rename: README.md
